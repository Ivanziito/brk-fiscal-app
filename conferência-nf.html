<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conferência de NF — BRK</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    padding: 16px 24px 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 14px;
  }

  header h1 { font-size: 1.12rem; font-weight: 700; letter-spacing: 0.3px; }
  header p  { font-size: 0.76rem; opacity: 0.6; margin-top: 2px; }

  /* Company tabs */
  .company-tabs {
    display: flex;
    gap: 4px;
    padding-top: 4px;
  }

  .co-tab {
    padding: 9px 20px 8px;
    border-radius: 8px 8px 0 0;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.55);
    transition: all 0.15s;
    user-select: none;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .co-tab:hover { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.85); }

  .co-tab.active {
    background: #f0f2f5;
    color: #1a1a2e;
  }

  .co-tab.tab-matriz.active  { border-top: 3px solid #4a6cf7; }
  .co-tab.tab-filial.active  { border-top: 3px solid #e07a1a; }
  .co-tab.tab-com.active     { border-top: 3px solid #2e7d32; }

  /* Info bar below header */
  .info-bar {
    background: #fff;
    border-bottom: 1px solid #e8ecf5;
    padding: 9px 24px;
    font-size: 0.78rem;
    color: #666;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .info-bar strong { color: #1a1a2e; }

  .regime-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 700;
    margin-left: 6px;
  }

  .badge-lp  { background: #e8eeff; color: #4a6cf7; }
  .badge-sn  { background: #e8f5e9; color: #2e7d32; }
  .badge-re  { background: #fff3e8; color: #e07a1a; }

  .container { max-width: 1200px; margin: 0 auto; padding: 18px 16px 40px; }

  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .search-bar input {
    flex: 1;
    padding: 11px 16px;
    border: 2px solid #dde3f0;
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    background: #fff;
  }

  .search-bar input:focus { border-color: #4a6cf7; }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }

  .filter-label {
    font-size: 0.76rem;
    color: #666;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .filter-group { display: flex; gap: 5px; align-items: center; }

  .chip {
    padding: 5px 13px;
    border-radius: 18px;
    font-size: 0.81rem;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }

  .chip-tipo { background: #eef1fb; color: #4a6cf7; border-color: #d0d9f8; }
  .chip-tipo.active, .chip-tipo:hover { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }

  .chip-dir { background: #fff3e8; color: #e07a1a; border-color: #f5d5b0; }
  .chip-dir.active, .chip-dir:hover { background: #e07a1a; color: #fff; border-color: #e07a1a; }

  .chip-clear { background: #fdecea; color: #d32f2f; border-color: #f8c8c5; margin-left: auto; }
  .chip-clear:hover { background: #d32f2f; color: #fff; border-color: #d32f2f; }

  .stats { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
  .stats strong { color: #4a6cf7; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }

  thead tr { background: #1a1a2e; color: #fff; }

  thead th {
    padding: 10px 11px;
    font-size: 0.75rem;
    font-weight: 700;
    text-align: left;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  thead th.center { text-align: center; }

  .section-header td {
    padding: 7px 12px;
    font-size: 0.73rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
  }

  .sec-interna       { background: #2e7d32; }
  .sec-interestadual { background: #1565c0; }
  .sec-exterior      { background: #6a1b9a; }

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.12s;
  }

  tbody tr:hover { background: #f5f8ff; }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 8px 11px;
    font-size: 0.81rem;
    vertical-align: middle;
  }

  td.desc { max-width: 320px; line-height: 1.4; }
  td.center { text-align: center; }

  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 10px;
    font-size: 0.71rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .badge-entrada { background: #e8f5e9; color: #2e7d32; }
  .badge-saida   { background: #fff3e8; color: #e07a1a; }

  .cfop {
    font-family: monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: #1a1a2e;
    background: #f0f2f5;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .cst {
    font-family: monospace;
    font-size: 0.83rem;
    color: #555;
    background: #f5f5f5;
    padding: 2px 7px;
    border-radius: 5px;
  }

  .aliq { font-size: 0.79rem; color: #444; font-weight: 600; }

  .no-results {
    text-align: center;
    padding: 48px 16px;
    color: #aaa;
    font-size: 0.93rem;
  }

  mark { background: #fff176; border-radius: 2px; padding: 0 1px; }

  @media (max-width: 768px) {
    table { font-size: 0.73rem; }
    td, th { padding: 6px 7px; }
    td.desc { max-width: 180px; }
    .co-tab { padding: 8px 12px; font-size: 0.76rem; }
  }
</style>
</head>

<header>

      <span class="chip chip-dir" data-dir="saida" onclick="toggleDir(this)">Saída</span>
    </div>
    <span class="chip chip-clear" onclick="clearAll()">✕ Limpar</span>
  </div>

  <div class="stats" id="stats"></div>
  <div id="tableWrap"></div>
</div>

// ─── STATE ─────────────────────────────────────────────────────────────────
let currentCo  = 'matriz';
let filtroTipo = 'todos';
let filtroDir  = 'todos';

// ─── ACTIONS ───────────────────────────────────────────────────────────────
function selectCompany(co, el) {
  currentCo = co;
  document.querySelectorAll('.co-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  clearFiltersOnly();
  updateInfoBar();
  render();
}

function toggleTipo(el) {
  document.querySelectorAll('#filtroTipo .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filtroTipo = el.dataset.tipo;
  render();
}

function toggleDir(el) {
  document.querySelectorAll('#filtroDir .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filtroDir = el.dataset.dir;
  render();
}

function clearFiltersOnly() {
  filtroTipo = 'todos'; filtroDir = 'todos';
  document.getElementById('search').value = '';
  document.querySelectorAll('.chip-tipo').forEach((c,i) => c.classList.toggle('active', i===0));
  document.querySelectorAll('.chip-dir').forEach((c,i)  => c.classList.toggle('active', i===0));
}

function clearAll() {
  clearFiltersOnly();
  render();
}

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return String(text).replace(re, '<mark>$1</mark>');
}

// ─── INFO BAR ──────────────────────────────────────────────────────────────
function updateInfoBar() {
  const co = COMPANIES[currentCo];
  const regTag = co.simples
    ? `<span class="regime-badge badge-sn">Simples Nacional</span>`
    : `<span class="regime-badge badge-lp">Lucro Presumido</span>`;
  const reTag = co.regimeEspecial
    ? `<span class="regime-badge badge-re">${co.regimeEspecial}</span>`
    : '';
  document.getElementById('infoBar').innerHTML =
    `<span><strong>CNPJ:</strong> ${co.cnpj}</span>
     <span><strong>Regime:</strong> ${regTag}${reTag}</span>
     <span><strong>Total de operações:</strong> ${co.data.length}</span>`;
}

// ─── RENDER TABLE ──────────────────────────────────────────────────────────
function render() {
  const co = COMPANIES[currentCo];
  const isSimples = co.simples;
  const q = document.getElementById('search').value.trim().toLowerCase();

  let rows = co.data.filter(r => {
    if (filtroTipo !== 'todos' && r.tipo !== filtroTipo) return false;
    if (filtroDir  !== 'todos' && r.dir  !== filtroDir)  return false;
    if (q) return r.cfop.includes(q) || r.desc.toLowerCase().includes(q);
    return true;
  });

  document.getElementById('stats').innerHTML =
    `Exibindo <strong>${rows.length}</strong> de ${co.data.length} operações`;

  if (rows.length === 0) {
    document.getElementById('tableWrap').innerHTML =
      `<div class="no-results"><p>Nenhuma operação encontrada para os filtros selecionados.</p></div>`;
    return;
  }

  // Table header
  const icmsHeader = isSimples
    ? `<th class="center">CSOSN ICMS</th>`
    : `<th class="center">CST ICMS</th><th class="center">Alíq. ICMS</th>`;

  let html = `<table><thead><tr>
    <th style="min-width:75px">CFOP</th>
    <th>Descrição da Operação</th>
    <th class="center" style="min-width:52px">Tipo</th>
    ${icmsHeader}
    <th class="center">CST PIS</th>
    <th class="center">Alíq. PIS</th>
    <th class="center">CST COFINS</th>
    <th class="center">Alíq. COFINS</th>
    <th class="center">CST IPI</th>
    <th class="center">Alíq. IPI</th>
  </tr></thead><tbody>`;

  const tipoOrder = ["interna","interestadual","exterior"];
  const tipoLabel = {interna:"Operações Internas",interestadual:"Operações Interestaduais",exterior:"Operações Exterior"};
  const tipoClass = {interna:"sec-interna",interestadual:"sec-interestadual",exterior:"sec-exterior"};

  for (const tipo of tipoOrder) {
    const grupo = rows.filter(r => r.tipo === tipo);
    if (!grupo.length) continue;
    const cols = isSimples ? 9 : 10;
    html += `<tr class="section-header"><td colspan="${cols}" class="${tipoClass[tipo]}">${tipoLabel[tipo]}</td></tr>`;
    for (const r of grupo) {
      const icmsCols = isSimples
        ? `<td class="center"><span class="cst">${hl(r.csosn,q)}</span></td>`
        : `<td class="center"><span class="cst">${hl(r.cst_icms,q)}</span></td><td class="center aliq">${r.aliq_icms}</td>`;
      html += `<tr>
        <td><span class="cfop">${hl(r.cfop,q)}</span></td>
        <td class="desc">${hl(r.desc,q)}</td>
        <td class="center"><span class="badge badge-${r.dir}">${r.dir==='entrada'?'Entrada':'Saída'}</span></td>
        ${icmsCols}
        <td class="center"><span class="cst">${r.cst_pis}</span></td>
        <td class="center aliq">${r.aliq_pis}</td>
        <td class="center"><span class="cst">${r.cst_cof}</span></td>
        <td class="center aliq">${r.aliq_cof}</td>
        <td class="center"><span class="cst">${r.cst_ipi}</span></td>
        <td class="center aliq">${r.aliq_ipi}</td>
      </tr>`;
    }
  }

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

// Init
updateInfoBar();
render();
document.getElementById('search').focus();
</script>
</body>
</html>
